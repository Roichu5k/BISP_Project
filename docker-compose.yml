version: '3.8'

services:
  postgres:
    # Usamos la imagen oficial de TimescaleDB (basada en Postgres 16)
    image: timescale/timescaledb:latest-pg16
    container_name: bisp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bisp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bisp_password}
      POSTGRES_DB: ${POSTGRES_DB:-bisp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: bisp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
